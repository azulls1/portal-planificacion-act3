name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend · lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint con ruff
        run: ruff check src tests

      - name: Tests pytest
        run: pytest --tb=short -q

  frontend:
    name: Frontend · lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build production
        run: npm run build

  pddl:
    name: PDDL · validar archivos y simular planes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend (sólo para usar el simulador)
        working-directory: apps/backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validar y simular los 3 problemas
        working-directory: apps/backend
        run: |
          python <<'PY'
          import sys
          sys.path.insert(0, "src")
          from pathlib import Path
          from portal_act3.domain.pddl_validator import validate_domain, validate_problem
          from portal_act3.domain.plan_simulator import simulate

          pddl_dir = Path("../../entregables/pddl")
          plans_dir = Path("../../entregables/planes")

          validate_domain((pddl_dir / "domain.pddl").read_text(encoding="utf-8"))

          expected_costs = {1: 14, 2: 19, 3: 20}
          fail = False
          for n, expected in expected_costs.items():
              problem = (pddl_dir / f"problem-{n}.pddl").read_text(encoding="utf-8")
              validate_problem(problem)
              plan = (plans_dir / f"rover-problem-{n}-plan.txt").read_text(encoding="utf-8")
              result = simulate(problem, plan)
              status = "OK  " if result.success and result.cost == expected else "FAIL"
              print(f"{status} problem-{n}  cost={result.cost} expected={expected} goal={result.goal_satisfied}")
              if not (result.success and result.cost == expected):
                  fail = True
                  if result.first_error:
                      print(f"     paso {result.first_error.step}: {result.first_error.error}")
          if fail:
              sys.exit(1)
          PY
