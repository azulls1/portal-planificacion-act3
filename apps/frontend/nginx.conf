server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Proxy API requests al backend FastAPI.
    # Usamos `tasks.portal-act3_backend` (Swarm DNS) que devuelve directamente
    # los endpoints de las tasks de NUESTRO backend, sin pasar por VIP y sin
    # colisionar con otros servicios "backend" en iagenteknet.
    resolver 127.0.0.11 valid=10s ipv6=off;
    location /api/ {
        set $portal_backend "tasks.portal-act3_backend";
        proxy_pass http://$portal_backend:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # Activos estáticos con cache larga
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: cualquier ruta cliente cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
