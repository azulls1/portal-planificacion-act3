<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" font-family="Helvetica, Arial, sans-serif" font-size="16">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="350" y="32" text-anchor="middle" font-size="18" font-weight="bold">Figura 3. Topología del problema base (problem-1.pddl)</text>
  <text x="350" y="56" text-anchor="middle" font-size="13" fill="#555">5 localidades · 2 minerales · 1 laboratorio · 5 aristas (3 bidireccionales + 2 unidireccionales)</text>

  <!-- Aristas -->
  <!-- L1 <-> L3 (bidir) -->
  <line x1="160" y1="200" x2="320" y2="130" stroke="#222" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <!-- L3 -> L2 (unidir) -->
  <line x1="380" y1="130" x2="540" y2="200" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- L2 -> L4 (unidir) -->
  <line x1="560" y1="240" x2="400" y2="340" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- L3 <-> L4 (bidir) -->
  <line x1="350" y1="160" x2="350" y2="320" stroke="#222" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <!-- L4 <-> L5 (bidir) -->
  <line x1="350" y1="380" x2="350" y2="490" stroke="#222" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

  <!-- Nodos -->
  <!-- L1 (mineral M1) -->
  <circle cx="130" cy="220" r="40" fill="#fff3cd" stroke="#222" stroke-width="2"/>
  <text x="130" y="217" text-anchor="middle" font-weight="bold">L1</text>
  <text x="130" y="237" text-anchor="middle" font-size="12" fill="#8a6d3b">M1</text>

  <!-- L2 (mineral M2) -->
  <circle cx="570" cy="220" r="40" fill="#d4edda" stroke="#222" stroke-width="2"/>
  <text x="570" y="217" text-anchor="middle" font-weight="bold">L2</text>
  <text x="570" y="237" text-anchor="middle" font-size="12" fill="#155724">M2</text>

  <!-- L3 (paso) -->
  <circle cx="350" cy="130" r="35" fill="#ffffff" stroke="#222" stroke-width="2"/>
  <text x="350" y="135" text-anchor="middle" font-weight="bold">L3</text>

  <!-- L4 (rover inicial) -->
  <circle cx="350" cy="350" r="40" fill="#cfe2f3" stroke="#222" stroke-width="2"/>
  <text x="350" y="347" text-anchor="middle" font-weight="bold">L4</text>
  <text x="350" y="367" text-anchor="middle" font-size="12" fill="#1f4e79">rover</text>

  <!-- L5 (laboratorio) -->
  <circle cx="350" cy="520" r="40" fill="#f8d7da" stroke="#222" stroke-width="2"/>
  <text x="350" y="517" text-anchor="middle" font-weight="bold">L5</text>
  <text x="350" y="537" text-anchor="middle" font-size="12" fill="#721c24">lab</text>

  <!-- Leyenda -->
  <g transform="translate(40,540)" font-size="12">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="50" y="4">unidireccional</text>
    <line x1="0" y1="20" x2="40" y2="20" stroke="#222" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <text x="50" y="24">bidireccional</text>
  </g>
</svg>
